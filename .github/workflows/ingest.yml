name: Scheduled Data Ingestion

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  DATA_FETCHERS_URL: ${{ secrets.DATA_FETCHERS_URL }}
  EMBEDDING_SERVICE_URL: ${{ secrets.EMBEDDING_SERVICE_URL }}
  SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m pipeline.run
